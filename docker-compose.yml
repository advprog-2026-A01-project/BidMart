services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bidmart
      POSTGRES_USER: bidmart
      POSTGRES_PASSWORD: bidmart
    volumes:
      - bidmart_db:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidmart -d bidmart"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/bidmart
      SPRING_DATASOURCE_USERNAME: bidmart
      SPRING_DATASOURCE_PASSWORD: bidmart
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  bidmart_db: