spring.datasource.url=jdbc:h2:mem:bidmart;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.sql.init.mode=always

auth.access-ttl-minutes=60
auth.refresh-ttl-days=14
auth.max-sessions-per-user=5
auth.overflow-policy=REVOKE_OLDEST

# Tujuan: bikin test pakai H2 in-memory (cepat, repeatable).