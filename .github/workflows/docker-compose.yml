name: CI-CD

on:
  push:
    branches: ["main", "staging"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Backend - test + quality
        working-directory: backend
        run: ./gradlew clean test pmdMain pmdTest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend - build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build & start stack
        run: docker compose up -d --build

      - name: Smoke test backend
        run: |
          curl -fsS -v \
            --retry 30 \
            --retry-delay 2 \
            --retry-connrefused \
            --retry-all-errors \
            http://localhost:8080/api/db/ping \
          || {
            echo "=== docker compose ps ===";
            docker compose ps;
            echo "=== backend logs ===";
            docker compose logs backend;
            echo "=== db logs ===";
            docker compose logs db;
            exit 1;
          }

      - name: Smoke test frontend
        run: |
          curl -fsS -v \
            --retry 30 \
            --retry-delay 2 \
            --retry-connrefused \
            --retry-all-errors \
            http://localhost:5173/ \
          || {
            echo "=== docker compose ps ===";
            docker compose ps;
            echo "=== frontend logs ===";
            docker compose logs frontend;
            exit 1;
          }

      - name: Show containers
        run: docker compose ps

      - name: Mark environment
        run: echo "Deployed environment = ${{ github.ref_name }}"

      - name: Tear down
        if: always()
        run: docker compose down -v