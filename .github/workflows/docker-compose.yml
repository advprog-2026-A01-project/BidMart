name: CI-CD

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Backend
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Backend - test + quality
        working-directory: backend
        run: ./gradlew clean test pmdMain pmdTest

      # Fullstack
      # Frontend
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Frontend - build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build & start stack (dummy deploy)
        run: |
          docker compose up -d --build
          # smoke check backend
          curl -fsS http://localhost:8080/api/db/ping || (docker compose logs backend && exit 1)
          # smoke check frontend
          curl -fsS http://localhost:5173/ || (docker compose logs frontend && exit 1)
          docker compose ps
          docker compose down

      - name: Mark environment
        run: |
          echo "Deployed environment = ${{ github.ref_name }}"